name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  stylua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      - run: make test

  fixture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ubuntu runners ship bazelisk as `bazel`; it honors .bazelversion
      - run: bazel query //... --output=label_kind
        working-directory: tests/fixture
      - run: bazel test //...
        working-directory: tests/fixture
